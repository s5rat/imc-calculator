
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор ИМТ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f8fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
        }
        label, input {
            display: block;
            width: 100%;
            margin-bottom: 15px;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            padding: 10px;
            background-color: #1e90ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #result, #recommendation {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Калькулятор ИМТ</h1>
        <label for="weight">Вес (кг):</label>
        <input type="number" id="weight" placeholder="Введите вес в кг">

        <label for="height">Рост (см):</label>
        <input type="number" id="height" placeholder="Введите рост в см">

        <button onclick="calculateBMI()">Рассчитать ИМТ</button>

        <div id="result"></div>
        <div id="recommendation"></div>
    </div>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value) / 100;
            if (!weight || !height) {
                alert("Пожалуйста, введите корректные значения.");
                return;
            }
            const bmi = (weight / (height * height)).toFixed(1);
            let category = "";
            let advice = "";

            if (bmi < 16) {
                category = "Выраженный дефицит массы тела";
                advice = "Необходимо срочно проконсультироваться с врачом и пересмотреть питание.";
            } else if (bmi < 18.5) {
                category = "Недостаточный вес";
                advice = "Рекомендуется увеличить калорийность рациона и следить за здоровьем.";
            } else if (bmi < 25) {
                category = "Норма";
                advice = "Масса тела в пределах нормы. Поддерживайте активный образ жизни!";
            } else if (bmi < 30) {
                category = "Избыточный вес";
                advice = "Рекомендуется сократить потребление жирной пищи и увеличить физическую активность.";
            } else if (bmi < 35) {
                category = "Ожирение I степени";
                advice = "Следует проконсультироваться с диетологом и пересмотреть образ жизни.";
            } else if (bmi < 40) {
                category = "Ожирение II степени";
                advice = "Требуется медицинское вмешательство и комплексная программа снижения веса.";
            } else {
                category = "Ожирение III степени (морбидное)";
                advice = "Необходимо немедленно обратиться к врачу. Возможны серьёзные осложнения.";
            }

            document.getElementById('result').innerText = `Ваш ИМТ: ${bmi} (${category})`;
            document.getElementById('recommendation').innerText = `Рекомендация: ${advice}`;
        }
    </script>
</body>
</html>
